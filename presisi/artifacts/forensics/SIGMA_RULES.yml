author: Kenshin Himura - DTrust
date: 2026/06/28
description: Detects telemetry upload paths to Uptodown servers
detection:
  condition: selection
  selection:
    cs-uri|contains:
    - /eapi/v2/tracker/device
    - /eapi/androidtracker/device-apps-installed
    - /eapi/user-data/native-app-usage
    - /eapi/v3/device/daily-stats
falsepositives:
- Legitimate Uptodown API calls
fields:
- src_ip
- dst_ip
- cs-uri
- cs-method
